spring.application.name=warehouse-system-backend

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:warehouse_system}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=false

logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.servlet.context-path=/

management.endpoints.web.exposure.include=health,info

app.security.jwt.issuer=artiselite-warehouse
app.security.jwt.secret=${APP_JWT_SECRET:YXJ0aXNlbGl0ZS13YXJlaG91c2Utand0LXNlY3JldC1rZXktZm9yLWxvY2FsLWRldmVsb3BtZW50LTAx}
app.security.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:120}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}
app.seed.manager-email=${APP_SEED_MANAGER_EMAIL:manager@artiselite.local}
app.seed.manager-password=${APP_SEED_MANAGER_PASSWORD:Manager@123}
app.seed.manager-full-name=${APP_SEED_MANAGER_FULL_NAME:System Manager}
app.seed.operator-email=${APP_SEED_OPERATOR_EMAIL:operator@artiselite.local}
app.seed.operator-password=${APP_SEED_OPERATOR_PASSWORD:Operator@123}
app.seed.operator-full-name=${APP_SEED_OPERATOR_FULL_NAME:Warehouse Operator}