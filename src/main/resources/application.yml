spring:
  application:
    name: warehouse-system-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt:
      issuer: artiselite-warehouse
      secret: ${APP_JWT_SECRET:YXJ0aXNlbGl0ZS13YXJlaG91c2Utand0LXNlY3JldC1rZXktZm9yLWxvY2FsLWRldmVsb3BtZW50LTAx}
      expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:120}
  seed:
    manager-email: ${APP_SEED_MANAGER_EMAIL:manager@artiselite.local}
    manager-password: ${APP_SEED_MANAGER_PASSWORD:Manager@123}
    manager-full-name: ${APP_SEED_MANAGER_FULL_NAME:System Manager}
    operator-email: ${APP_SEED_OPERATOR_EMAIL:operator@artiselite.local}
    operator-password: ${APP_SEED_OPERATOR_PASSWORD:Operator@123}
    operator-full-name: ${APP_SEED_OPERATOR_FULL_NAME:Warehouse Operator}
